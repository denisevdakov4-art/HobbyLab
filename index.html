<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HobbyLab - Твой город, твои люди</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h1>HobbyLab</h1>
            <p>Органайзер хобби и встреч</p>
            <input type="text" id="username" placeholder="Введите ваше имя" autocomplete="username">
            <button id="login-btn">Войти в лабораторию</button>
        </div>
    </div>

    <div id="main-app" class="screen" style="display: none;">
        <header>
            <div class="header-content">
                <h2>HobbyLab</h2>
                <button class="btn-exit" onclick="logout()">Выйти</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="event-name" placeholder="Что планируем?" autocomplete="off">
                <input type="datetime-local" id="event-time">
            </div>
            <button class="btn-add" onclick="addMarker()">Разместить на карте</button>
        </div>

        <div id="events-container">
            </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
